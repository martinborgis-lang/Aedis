<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0A0B0D;
        }
        .blueprint-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }
        .blueprint-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
        }
        .floor-plan {
            stroke: #FF7A3D;
            stroke-width: 1;
            fill: none;
            stroke-dasharray: 3, 2;
            animation: drawPlan 8s ease-in-out infinite;
        }
        .elevation {
            stroke: rgba(255, 122, 61, 0.4);
            stroke-width: 0.8;
            fill: none;
            stroke-dasharray: 4, 3;
            animation: drawElevation 10s ease-in-out infinite;
            animation-delay: 2s;
        }
        .detail {
            stroke: rgba(255, 122, 61, 0.25);
            stroke-width: 0.6;
            fill: none;
            stroke-dasharray: 2, 1;
            animation: drawDetail 6s ease-in-out infinite;
            animation-delay: 4s;
        }
        @keyframes drawPlan {
            0%, 100% {
                stroke-dashoffset: 200;
                opacity: 0.1;
            }
            25% {
                stroke-dashoffset: 0;
                opacity: 0.2;
            }
            50% {
                opacity: 0.15;
            }
            75% {
                opacity: 0.1;
            }
        }
        @keyframes drawElevation {
            0%, 100% {
                stroke-dashoffset: 150;
                opacity: 0.05;
            }
            30% {
                stroke-dashoffset: 0;
                opacity: 0.15;
            }
            70% {
                opacity: 0.1;
            }
        }
        @keyframes drawDetail {
            0%, 100% {
                stroke-dashoffset: 100;
                opacity: 0.02;
            }
            40% {
                stroke-dashoffset: 0;
                opacity: 0.1;
            }
            80% {
                opacity: 0.05;
            }
        }
    </style>
</head>
<body>
    <div class="blueprint-container">
        <!-- Floor Plan Layer -->
        <svg class="blueprint-layer" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <!-- Main structure -->
            <rect class="floor-plan" x="15" y="20" width="70" height="60" />
            <rect class="floor-plan" x="25" y="30" width="20" height="15" />
            <rect class="floor-plan" x="55" y="30" width="20" height="15" />
            <rect class="floor-plan" x="25" y="55" width="20" height="15" />
            <rect class="floor-plan" x="55" y="55" width="20" height="15" />
            <!-- Connecting lines -->
            <path class="floor-plan" d="M15,35 L25,35 M45,35 L55,35 M75,35 L85,35" />
            <path class="floor-plan" d="M15,65 L25,65 M45,65 L55,65 M75,65 L85,65" />
            <path class="floor-plan" d="M35,20 L35,30 M35,45 L35,55 M35,70 L35,80" />
            <path class="floor-plan" d="M65,20 L65,30 M65,45 L65,55 M65,70 L65,80" />
        </svg>

        <!-- Elevation Layer -->
        <svg class="blueprint-layer" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <!-- Building elevation -->
            <path class="elevation" d="M10,85 L10,25 L50,15 L90,25 L90,85" />
            <rect class="elevation" x="20" y="45" width="8" height="12" />
            <rect class="elevation" x="35" y="35" width="8" height="15" />
            <rect class="elevation" x="57" y="35" width="8" height="15" />
            <rect class="elevation" x="72" y="45" width="8" height="12" />
            <!-- Roof details -->
            <path class="elevation" d="M15,25 L45,18 M55,18 L85,25" />
        </svg>

        <!-- Detail Layer -->
        <svg class="blueprint-layer" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
            <!-- Construction details -->
            <circle class="detail" cx="25" cy="25" r="3" />
            <circle class="detail" cx="75" cy="25" r="3" />
            <circle class="detail" cx="25" cy="75" r="3" />
            <circle class="detail" cx="75" cy="75" r="3" />
            <!-- Dimension lines -->
            <path class="detail" d="M5,20 L5,80 M95,20 L95,80" />
            <path class="detail" d="M15,5 L85,5 M15,95 L85,95" />
            <!-- Small details -->
            <path class="detail" d="M30,40 L35,40 M30,42 L33,42" />
            <path class="detail" d="M65,40 L70,40 M67,42 L70,42" />
            <path class="detail" d="M30,60 L35,60 M30,62 L33,62" />
            <path class="detail" d="M65,60 L70,60 M67,62 L70,62" />
        </svg>
    </div>
</body>
</html>
